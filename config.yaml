watchlist:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - TONUSDT
  - ATOMUSDT
  - INJUSDT
  - DOGEUSDT

strategies:
  strategy_a_trend_pullback:
    enabled: true
  strategy_b_fvg_breaker_15m:
    enabled: true
  strategy_c_fvg_breaker_4h:
    enabled: true

strategy:
  trend_timeframe: "60"
  entry_timeframe: "15"
  ema_fast: 21
  ema_slow: 55
  rsi_period: 14
  atr_period: 14
  volume_sma_period: 20
  volume_spike_threshold: 1.5
  volume_strong_threshold: 1.5
  pullback_atr_tolerance: 0.35
  rsi_long_threshold: 45
  rsi_short_threshold: 55
  tp1_atr_multiplier: 2.0
  tp2_atr_multiplier: 4.5
  sl_atr_multiplier: 1.5
  min_risk_reward: 3.0
  min_confidence: 55
  atr_max_pct: 0.03
  atr_min_pct: 0.003
  extended_targets:
    enabled: true
    base_rr: 3.0
    high_confidence_rr: 5.0
    high_confidence_min_score: 95

bot:
  cooldown_hours: 4
  scan_interval_minutes: 15
  leverage_context: 5
  state_file: "state/bot_state.json"
  enable_telegram_commands: true
  symbol_scan_pause_seconds: 3.0
  report_interval_hours: 24

backtest:
  lookback_days: 180
  cache_dir: "data/cache"
  bybit_api_base_url: "https://api.bytick.com"

roi:
  leverage: 5
  target_tiers:
    - 100
    - 200
    - 300
    - 400
    - 500

strategy_b:
  name: "strategy_b_fvg_breaker_15m"
  enabled: true
  timeframe_entry: "15"
  timeframe_trend: "60"
  symbols:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - XRPUSDT
    - BNBUSDT
    - ADAUSDT
    - DOGEUSDT
    - LINKUSDT
    - AVAXUSDT
    - TONUSDT
    - DOTUSDT
    - UNIUSDT
    - ATOMUSDT
    - LTCUSDT
    - NEARUSDT
    - APTUSDT
    - ARBUSDT
    - OPUSDT
    - INJUSDT
    - SUIUSDT
    - TIAUSDT
  ema_fast: 21
  ema_slow: 55
  rsi_period: 14
  atr_period: 14
  volume_sma_period: 20
  fvg_min_gap_atr: 0.2
  fvg_max_age_candles: 48
  breaker_confirm_candles: 3
  breaker_max_age_candles: 96
  sl_atr_buffer: 0.3
  tp1_risk_multiplier: 1.5
  tp2_risk_multiplier: 2.5
  min_risk_reward: 2.0
  min_confidence: 50
  candle_body_min_pct: 0.40
  atr_max_pct: 0.04
  atr_min_pct: 0.003
  cooldown_hours: 24

strategy_c:
  name: "strategy_c_fvg_breaker_4h"
  enabled: true
  timeframe_entry: "240"
  symbols:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - XRPUSDT
    - BNBUSDT
    - ADAUSDT
    - DOGEUSDT
    - LINKUSDT
    - AVAXUSDT
    - TONUSDT
  ema_fast: 21
  ema_slow: 55
  rsi_period: 14
  atr_period: 14
  fvg_min_gap_atr: 0.3
  fvg_max_age_candles: 48
  breaker_confirm_candles: 3
  breaker_max_age_candles: 96
  sl_atr_buffer: 0.5
  tp1_risk_multiplier: 2.0
  tp2_risk_multiplier: 4.0
  tp1_position_pct: 0.40
  tp2_position_pct: 0.60
  min_risk_reward: 3.0
  min_confidence: 60
  candle_body_min_pct: 0.45
  atr_max_pct: 0.06
  atr_min_pct: 0.005
  cooldown_hours: 12
